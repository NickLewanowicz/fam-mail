name: Feature Request
description: Propose a new feature or enhancement for fam-mail
title: "[Feature]: "
labels: ["enhancement"]
projects: ["NickLewanowicz/4"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in fam-mail.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application does this affect?
      options:
        - Backend API
        - Frontend UI
        - PostGrid Integration
        - Address Validation
        - Image Upload/Processing
        - Message Editor
        - Authentication / OIDC
        - Drafts
        - Database
        - Docker/Deployment
        - CI/CD
        - Testing
        - Documentation
        - Developer Experience
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - "P0 - Must have for release"
        - "P1 - Important, should have soon"
        - "P2 - Nice to have"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the feature
      placeholder: What should this feature do? Why is it needed?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this feature is complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Tests pass
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Technical Design Notes
      description: Any implementation ideas or constraints
      placeholder: Relevant files, APIs, dependencies, or architecture considerations
  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      description: How much work is this?
      options:
        - XS (< 1 hour)
        - S (1-4 hours)
        - M (4-8 hours)
        - L (1-3 days)
        - XL (3+ days)
