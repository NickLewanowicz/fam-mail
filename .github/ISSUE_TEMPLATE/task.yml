name: Task
description: A development task, chore, or maintenance item
title: "[Task]: "
labels: []
projects: ["NickLewanowicz/4"]
body:
  - type: markdown
    attributes:
      value: |
        Track a specific development task or maintenance item.
  - type: dropdown
    id: type
    attributes:
      label: Task Type
      description: What kind of task is this?
      options:
        - Cleanup / Tech Debt
        - Testing
        - Documentation
        - Security
        - Performance
        - Refactoring
        - Configuration
        - CI/CD
        - Dependency Update
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 - Critical"
        - "P1 - Important"
        - "P2 - Normal"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: Break down the task into steps
      placeholder: |
        - [ ] Step 1
        - [ ] Step 2
        - [ ] Step 3
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant files, related issues, or background information
  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      options:
        - XS (< 1 hour)
        - S (1-4 hours)
        - M (4-8 hours)
        - L (1-3 days)
        - XL (3+ days)
