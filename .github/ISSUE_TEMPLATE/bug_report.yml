name: Bug Report
description: Report a bug in fam-mail postcard sending or web UI
title: "[Bug]: "
labels: ["bug"]
projects: ["NickLewanowicz/4"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application is affected?
      options:
        - Backend API
        - Frontend UI
        - PostGrid Integration
        - Address Validation
        - Image Upload/Processing
        - Message Editor
        - Authentication
        - Drafts
        - Database
        - Docker/Deployment
        - CI/CD
        - Other
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - "P0 - Critical: Postcards sent incorrectly or data loss"
        - "P1 - High: Feature broken, no workaround"
        - "P2 - Medium: Feature degraded, workaround exists"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Error messages, screenshots, logs, test output
      placeholder: Paste error output, attach screenshots, or link to CI logs
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Docker version, etc.
      placeholder: |
        - Browser: Chrome 130
        - OS: macOS 15
        - Docker: 27.x
  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      description: How much work to fix?
      options:
        - XS (< 1 hour)
        - S (1-4 hours)
        - M (4-8 hours)
        - L (1-3 days)
        - XL (3+ days)
