# NightShift orchestrator config for fam-mail
# Used by: nightshift run --config .claude/nightshift.yaml
#
# Human / Pi context: portable instructions live at repo root `AGENTS.md`.
# Claude Code loads root `CLAUDE.md` (which imports `AGENTS.md`). OpenCode
# reads `AGENTS.md` via `opencode.json` instructions.

project_dir: ".."

agent:
  backend: pi
  provider: zai
  model: glm-5.1
  max_turns: 50

  # GLM 4.7: 3x faster than 5.1, use for well-scoped implementation tasks
  # GLM 5.1 (default): orchestration, review, complex architecture
  # GLM 5-turbo: 5.1-quality at 4.7 speed but higher quota cost — use for review agent
  model_tiers:
    - model: glm-4.7
      provider: zai
      max_turns: 30
      labels: ["tier:fast"]

issue_tracker:
  type: github
  priority_labels:
    - P0-critical
    - P1-high
    - P2-medium
    - P3-low

qa:
  commands:
    - name: backend_tests
      cmd: "cd backend && bun test 2>&1"
      timeout: 30
    - name: frontend_tests
      cmd: "cd frontend && npx vitest run 2>&1"
      timeout: 90
    - name: backend_lint
      cmd: "cd backend && pnpm lint 2>&1"
      timeout: 30
    - name: frontend_lint
      cmd: "cd frontend && pnpm lint 2>&1"
      timeout: 30
    - name: frontend_build
      cmd: "cd frontend && pnpm build 2>&1"
      timeout: 60

# Verify all QA checks pass before starting the orchestration loop.
# Prevents nightshift from wasting cycles on a broken baseline.
qa_gate_on_start: true

session:
  max_wait_seconds: 900
  max_attempts_per_issue: 3

changelog_file: CHANGELOG_AGENT.md
progress_file: nightshift-progress.json
log_dir: logs/nightshift
