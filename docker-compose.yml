services:
  fammail:
    build: .
    container_name: fammail
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "8484:8484"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8484/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
